<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Session | Pet Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<script src="script.js"></script>
<body>

<header>
    <div class="nav-inner">
        <a href="index.html" class="nav-logo">Pet Studio</a>
        <nav>
            <ul>
                <li><a href="./index.html">Home</a></li>
                <li><a href="./index.html#Price">Packages</a></li>
            </ul>
        </nav>
    </div>
    <canvas id="offerCanvas" width="1000" height="48"></canvas>
</header>

<section class="book" id="book">
    <span class="section-label" style="display:block; text-align:center;">Reservations</span>
    <h2>Book a Session</h2>
    <p>Fill in the details and we'll get back to you shortly</p>

    <form class="booking-form" id="bookingForm">

        <fieldset>
            <legend>Owner Details</legend>
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="tel" name="phone" placeholder="Phone Number" required>
        </fieldset>

        <fieldset>
            <legend>Pet Details</legend>
            <input type="text" name="petName" placeholder="Pet Name">
            <p style="margin-top: 12px; font-size: 0.88rem; color: var(--mid-gray);">Pet Type</p>
            <div style="display: flex; gap: 24px; margin-top: 8px; flex-wrap: wrap;">
                <label style="font-size: 0.9rem; color: var(--mid-gray); display:flex; align-items:center; gap:6px; cursor:pointer;">
                    <input type="radio" name="petType" value="Dog"> Dog
                </label>
                <label style="font-size: 0.9rem; color: var(--mid-gray); display:flex; align-items:center; gap:6px; cursor:pointer;">
                    <input type="radio" name="petType" value="Cat"> Cat
                </label>
                <label style="font-size: 0.9rem; color: var(--mid-gray); display:flex; align-items:center; gap:6px; cursor:pointer;">
                    <input type="radio" name="petType" value="Other"> Other
                </label>
            </div>
        </fieldset>

        <fieldset>
            <legend>Package Selection</legend>
            <select name="package" required>
                <option value="">Select Package</option>
                <option value="Mini">Mini Shoot &mdash; &#8377;5,500</option>
                <option value="Full">Full Shoot &mdash; &#8377;8,000</option>
                <option value="Premium">Premium &mdash; &#8377;14,000</option>
            </select>
            <input type="date" name="date" required>
        </fieldset>

        <fieldset>
            <legend>Add-ons</legend>
            <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 8px;">
                <label style="font-size: 0.9rem; color: var(--mid-gray); display:flex; align-items:center; gap:8px; cursor:pointer;">
                    <input type="checkbox" name="addons" value="photos"> Extra Edited Photos
                </label>
                <label style="font-size: 0.9rem; color: var(--mid-gray); display:flex; align-items:center; gap:8px; cursor:pointer;">
                    <input type="checkbox" name="addons" value="album"> Printed Album
                </label>
                <label style="font-size: 0.9rem; color: var(--mid-gray); display:flex; align-items:center; gap:8px; cursor:pointer;">
                    <input type="checkbox" name="addons" value="outdoor"> Outdoor Shoot
                </label>
            </div>
        </fieldset>

        <textarea name="notes" placeholder="Anything we should know about your pet?" rows="4"></textarea>

        <div class="form-buttons">
            <button type="submit" class="btn-submit">Book Now</button>
            <button type="reset" class="btn-reset">Reset</button>
        </div>

    </form>
</section>

</body>
</html>
